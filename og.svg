<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050c14"/>
      <stop offset="100%" stop-color="#0b1624"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#60c8d4" stop-opacity="0.35"/>
      <stop offset="65%" stop-color="#60c8d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.28"/>
      <stop offset="65%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(110,120)">
    <rect x="0" y="0" width="110" height="110" rx="28" fill="#0b1624" stroke="#2a3a52" stroke-width="3"/>
    <text x="55" y="71" text-anchor="middle" font-size="46"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace"
      fill="#60c8d4">64</text>
  </g>

  <text x="250" y="190" font-size="56" fill="#e9f0ff"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">x64base</text>
  <text x="250" y="245" font-size="22" fill="#9aaac8"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    A true 64-bit evolution of the xBase lineage — Born in 1993. Reimagined for 2026.
  </text>

  <g transform="translate(250,310)" fill="#9aaac8" font-size="18"
     font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace">
    <text x="0" y="0">DBF_64 • FPT64 • Indexing • Education-first</text>
  </g>
</svg>
