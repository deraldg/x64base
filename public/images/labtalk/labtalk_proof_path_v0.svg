<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="500" viewBox="0 0 1280 500" role="img" aria-labelledby="title desc">
  <title id="title">Proof-Aware Learning Path</title>
  <desc id="desc">A polished visual for the Laboratory Campus proof-aware learning path, showing a smooth route from concept through runtime evidence and review into a student lesson.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="1" stop-color="#edf4f6"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#31a58f"/>
      <stop offset=".28" stop-color="#4387c6"/>
      <stop offset=".62" stop-color="#8066c8"/>
      <stop offset="1" stop-color="#c9776c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#50606d" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 38px; font-weight: 760; fill: #172432; }
      .sub { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; fill: #5c6a75; }
      .step { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 760; fill: #172432; }
      .micro { font-family: Segoe UI, Arial, sans-serif; font-size: 11px; font-weight: 750; letter-spacing: 1px; fill: #667782; }
    </style>
  </defs>

  <rect width="1280" height="500" fill="url(#paper)"/>
  <path d="M0 385 C180 334 334 416 522 366 C726 312 910 345 1088 304 C1164 287 1222 258 1280 230 L1280 500 L0 500 Z" fill="#dfecee" opacity=".72"/>
  <text x="72" y="78" class="title">Proof-Aware Learning Path</text>
  <text x="74" y="111" class="sub">A lesson is not just prose. It keeps its concept, app, dataset, command, evidence, case, and review trail.</text>

  <g transform="translate(82 185)">
    <path d="M44 88 C184 8 302 14 433 72 C574 134 681 124 814 66 C920 20 1011 17 1130 70" fill="none" stroke="#d1dde1" stroke-width="22" stroke-linecap="round"/>
    <path d="M44 88 C184 8 302 14 433 72 C574 134 681 124 814 66 C920 20 1011 17 1130 70" fill="none" stroke="url(#route)" stroke-width="9" stroke-linecap="round"/>

    <g filter="url(#shadow)">
      <g transform="translate(0 42)">
        <circle cx="44" cy="44" r="44" fill="#ffffff" stroke="#c7d7dc"/>
        <path d="M30 44 H58 M44 30 V58" stroke="#31a58f" stroke-width="6" stroke-linecap="round"/>
        <text x="44" y="112" text-anchor="middle" class="step">Concept</text>
      </g>
      <g transform="translate(188 0)">
        <circle cx="44" cy="44" r="44" fill="#ffffff" stroke="#c7d7dc"/>
        <rect x="25" y="26" width="38" height="28" rx="5" fill="#4387c6"/>
        <path d="M31 62 H57" stroke="#4387c6" stroke-width="5" stroke-linecap="round"/>
        <text x="44" y="112" text-anchor="middle" class="step">App</text>
      </g>
      <g transform="translate(374 54)">
        <circle cx="44" cy="44" r="44" fill="#ffffff" stroke="#c7d7dc"/>
        <path d="M24 27 H64 V61 H24 Z M31 38 H57 M31 49 H57" fill="none" stroke="#6d93c9" stroke-width="5" stroke-linecap="round"/>
        <text x="44" y="112" text-anchor="middle" class="step">Dataset</text>
      </g>
      <g transform="translate(560 84)">
        <circle cx="44" cy="44" r="44" fill="#ffffff" stroke="#c7d7dc"/>
        <path d="M27 36 L40 50 L64 27" fill="none" stroke="#8066c8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="44" y="112" text-anchor="middle" class="step">Command</text>
      </g>
      <g transform="translate(746 20)">
        <circle cx="44" cy="44" r="44" fill="#ffffff" stroke="#c7d7dc"/>
        <path d="M22 44 C33 27 55 27 66 44 C55 61 33 61 22 44 Z" fill="none" stroke="#8f6ac0" stroke-width="5" stroke-linecap="round"/>
        <circle cx="44" cy="44" r="6" fill="#8f6ac0"/>
        <text x="44" y="112" text-anchor="middle" class="step">Proof</text>
      </g>
      <g transform="translate(932 2)">
        <circle cx="44" cy="44" r="44" fill="#ffffff" stroke="#c7d7dc"/>
        <path d="M28 26 H60 V62 H28 Z M35 38 H53 M35 50 H50" fill="none" stroke="#bd6f9a" stroke-width="5" stroke-linecap="round"/>
        <text x="44" y="112" text-anchor="middle" class="step">Case</text>
      </g>
      <g transform="translate(1118 28)">
        <circle cx="44" cy="44" r="44" fill="#ffffff" stroke="#c7d7dc"/>
        <path d="M25 59 C30 34 58 34 63 59 M32 59 H56" fill="none" stroke="#c9776c" stroke-width="6" stroke-linecap="round"/>
        <text x="44" y="112" text-anchor="middle" class="step">Lesson</text>
      </g>
    </g>
  </g>

  <g transform="translate(72 418)">
    <rect x="0" y="0" width="1136" height="38" rx="19" fill="#162331" opacity=".94"/>
    <text x="32" y="25" class="micro" fill="#e9f4f6">SOURCE DEFINES</text>
    <text x="232" y="25" class="micro" fill="#e9f4f6">HELP EXPLAINS</text>
    <text x="432" y="25" class="micro" fill="#e9f4f6">RUNTIME PROVES</text>
    <text x="658" y="25" class="micro" fill="#e9f4f6">SELFDOC PRESERVES</text>
    <text x="900" y="25" class="micro" fill="#e9f4f6">MDO REVIEWS</text>
    <text x="1054" y="25" class="micro" fill="#e9f4f6">PUBLISH</text>
  </g>
</svg>
