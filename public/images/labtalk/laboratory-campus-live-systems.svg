<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="campus-title campus-desc">
  <title id="campus-title">Learning Around Live Systems</title>
  <desc id="campus-desc">An isometric laboratory campus with a central x64base systems building connected by paths to Runtime, History, SelfDoc, Case, Dataset, and Interface laboratories.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4fafc"/>
      <stop offset="1" stop-color="#e7f1f3"/>
    </linearGradient>
    <linearGradient id="campus-ground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcece4"/>
      <stop offset="0.55" stop-color="#e9eee1"/>
      <stop offset="1" stop-color="#dde6ef"/>
    </linearGradient>
    <linearGradient id="tower-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ac8c4"/>
      <stop offset="1" stop-color="#3d6fb4"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#17384a" flood-opacity="0.18"/>
    </filter>
    <style>
      .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .label { font: 700 14px Inter, "Segoe UI", Arial, sans-serif; fill: #183142; text-anchor: middle; }
      .sub { font: 500 11px Inter, "Segoe UI", Arial, sans-serif; fill: #607681; text-anchor: middle; }
      .path { fill: none; stroke: #aec2c5; stroke-width: 16; stroke-linecap: round; opacity: .72; }
      .path-line { fill: none; stroke: #f7fbf9; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 2 10; opacity: .95; }
      .window { fill: #dff7f6; stroke: #7fb0ba; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#sky)"/>
  <path d="M0 536 C185 462 345 521 508 475 C680 427 798 538 966 494 C1095 461 1178 461 1280 430 L1280 760 L0 760Z" fill="url(#campus-ground)"/>
  <path d="M48 176 C332 83 654 109 910 87 C1050 76 1148 72 1228 61" fill="none" stroke="#cddde2" stroke-width="2"/>

  <g class="sans">
    <text x="72" y="86" font-size="14" font-weight="800" letter-spacing="2.2" fill="#266a78">LABORATORY CAMPUS</text>
    <text x="72" y="139" font-size="44" font-weight="750" fill="#17283a">Learning Around Live Systems</text>
    <text x="74" y="177" font-size="17" fill="#566c79">Explore working systems, their evidence, their history, and the lessons built from them.</text>
  </g>

  <!-- Walkways are drawn first so every route visibly terminates at a building. -->
  <g aria-hidden="true">
    <path class="path" d="M640 520 C540 520 438 487 350 433"/>
    <path class="path-line" d="M640 520 C540 520 438 487 350 433"/>
    <path class="path" d="M640 500 C583 425 544 384 500 338"/>
