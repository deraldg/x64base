<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">LabTalk Proof Path</title>
  <desc id="desc">A left-to-right diagram showing concept to app to dataset to command to proof to case to lesson.</desc>
  <rect width="1280" height="420" fill="#fafafa"/>
  <text x="640" y="68" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#111827">LabTalk Proof-Aware Learning Path</text>
  <text x="640" y="104" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4b5563">Lessons stay connected to live or reviewed evidence</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
  </defs>

  <g font-family="Segoe UI, Arial, sans-serif">
    <g>
      <rect x="60" y="180" width="132" height="74" rx="10" fill="#e8f3ef" stroke="#1f6f52" stroke-width="2"/>
      <text x="126" y="225" text-anchor="middle" font-size="20" font-weight="700" fill="#143f30">Concept</text>
    </g>
    <g>
      <rect x="238" y="180" width="132" height="74" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
      <text x="304" y="225" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">App</text>
    </g>
    <g>
      <rect x="416" y="180" width="132" height="74" rx="10" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
      <text x="482" y="225" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Dataset</text>
    </g>
    <g>
      <rect x="594" y="180" width="132" height="74" rx="10" fill="#fff1df" stroke="#aa5b00" stroke-width="2"/>
      <text x="660" y="214" text-anchor="middle" font-size="20" font-weight="700" fill="#6f3b00">Command</text>
      <text x="660" y="237" text-anchor="middle" font-size="14" fill="#6f3b00">or Script</text>
    </g>
    <g>
      <rect x="772" y="180" width="132" height="74" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
      <text x="838" y="225" text-anchor="middle" font-size="20" font-weight="700" fill="#164e63">Proof</text>
    </g>
    <g>
      <rect x="950" y="180" width="132" height="74" rx="10" fill="#fdf2f8" stroke="#be185d" stroke-width="2"/>
      <text x="1016" y="225" text-anchor="middle" font-size="20" font-weight="700" fill="#831843">Case</text>
    </g>
    <g>
      <rect x="1128" y="180" width="132" height="74" rx="10" fill="#fefce8" stroke="#a16207" stroke-width="2"/>
      <text x="1194" y="225" text-anchor="middle" font-size="20" font-weight="700" fill="#713f12">Lesson</text>
    </g>
  </g>

  <g stroke="#374151" stroke-width="3" marker-end="url(#arrow)">
    <line x1="196" y1="217" x2="232" y2="217"/>
    <line x1="374" y1="217" x2="410" y2="217"/>
    <line x1="552" y1="217" x2="588" y2="217"/>
    <line x1="730" y1="217" x2="766" y2="217"/>
    <line x1="908" y1="217" x2="944" y2="217"/>
    <line x1="1086" y1="217" x2="1122" y2="217"/>
  </g>

  <text x="640" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#374151">Example: EDREF concept -> DotTalk++ script -> runtime transcript -> case-backed student lab</text>
</svg>
