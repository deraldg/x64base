  - id: project.labtalk.pdlc
    name: PDLC - Programming Development Life Cycle (Student/Working Model)
    kind: methodology_project
    status: active_seed
    root: D:/code/ccode
    owner_repo: deraldg/labtalk
    upstream_authority: project.x64base.runtime
    lanes: [framing, six_step_reference, worked_exemplar, publication]
    docs:
      - docs/maintenance/PDLC_STUDENT_WORKING_MODEL_LANE_V1.md
      - docs/maintenance/SCOPE_CALIBRATED_LIFECYCLE_DOCTRINE_V1.md
      - labtalk/ai_portal/SCOPE_CALIBRATION_SEED_V1.md
    notes: >-
      The documented program-scale life cycle (analyze -> design -> code ->
      test/debug -> document -> maintain), taught so the student model and the
      working model coincide (AIF-037 source teaches). Scope calibration is part
      of the lesson: students see the complete cycle, then select only the gates
      justified by mode, change class, actual build target, product profile, and
      affected consumers. Promoted from a lane per AIF-040; sibling of
      project.labtalk.sdlc. Worked-exemplar candidate is the tuple field-type
      extension.

  - id: project.labtalk.sdlc
    name: SDLC - Software Development Life Cycle Working Model
    kind: methodology_project
    status: active_seed
    root: D:/code/ccode
    owner_repo: deraldg/labtalk
    upstream_authority: project.x64base.runtime
    lanes: [charter, lane_governance, proof_gates, closeout, publication]
    docs:
      - docs/maintenance/DOTTALKPP_SDLC_CHARTER_v0.md
      - docs/maintenance/SCOPE_CALIBRATED_LIFECYCLE_DOCTRINE_V1.md
      - labtalk/ai_portal/SCOPE_CALIBRATION_SEED_V1.md
      - AI_PORTAL.md
    notes: >-
      The teachable model of the runtime's actual evidence-gated,
      Agile-descended SDLC (lanes -> milestones -> proof gates -> closeouts).
      Gate depth is scope-calibrated; x64base engine-only, dottalkpp runtime,
      product profile, and index profile are separate planning axes. Formalized
      as a project per AIF-040; sibling of project.labtalk.pdlc; charter-backed.
      Documents the working model already operating in project.x64base.runtime.

  # --- Identity / RBAC / Authorization management (AIF-045) ---

  - id: project.x64base.identity
    name: Identity, RBAC & Authorization Management
    kind: governance_project
    status: design_intake
    root: D:/code/ccode
    owner_repo: deraldg/x64base
    upstream_authority: project.x64base.runtime
    lanes: [entity_contract, rbac_core, management_schema, authorization_audit, cmd_security_bridge, registry_import, roundtrip_proof, teaching_loop]
    docs:
      - docs/maintenance/IDENTITY_RBAC_MANAGEMENT_LANE_V1.md
      - "docs/## AI Portal re-examination.txt"
      - src/cli/cmd_security.cpp
      - labtalk/registries/ai_portal.yaml
    notes: >-
      Durable identity/RBAC/authorization layer the AI Portal needs (AIF-045): USERS
      (identity) -> TEAM_MEMBER (participation) -> TEAM_ASSIGNMENT -> {ROLE, PERMISSION,
      ORG_UNIT, WORK_NODE, AUTHORIZATION_GRANT}, with the operational security policy kept
      independent as the final runtime constraint. Design-stage; external-AI plan evaluated
      and endorsed with caveats (USERS is greenfield not existing; authentication undesigned;
      PROJECT not lane, must not front-run BETA-1; phase the schema; self-hosting bootstrap is
      the sharp risk). First artifact is the Team Member/Role/Permission/Assignment/
      Authorization Contract v1 (M0), design not code. Feeds AI Portal gates APH-1/3/5.
