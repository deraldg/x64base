# LabTalk lesson registry v0

schema:
  id: Stable lesson identifier.
  title: Display title.
  lane: student | career | instructor | review
  status: idea | draft | proof_linked | student_ready_pending | student_ready
  path: Repo-local lesson document path, relative to the LabTalk root.
  proof_state: Current evidence state from registries/proofs.yaml.
  next_gate: The next review or proof step before promotion.

lessons:
  - id: lesson.student.properties_of_valid_data
    title: The Properties of Valid Data
    kind: lesson
    lane: student
    status: idea
    audience: [student, self-learner, instructor]
    path: lessons/student/properties_of_valid_data_v0.md
    website_path: /docs/labtalk/student-lessons
    concepts:
      - concept.database.table
      - concept.database.record
      - concept.database.field
      - concept.database.schema
    apps:
      - app.dottalkpp.runtime
      - app.dottalkpp.help
    labs:
      - lab.database_literacy.starter
    commands: [HELP, FIELDS, STRUCT, CREATE, APPEND BLANK, REPLACE]
    proof_state: source_defined
    next_gate: Define one runnable student exercise showing why valid data depends on field shape, type, range, and mutation rules before promoting this idea to a draft lesson.

  - id: lesson.student.records_fields_tables
    title: Records, Fields, and Tables
    kind: lesson
    lane: student
    status: draft
    audience: [student, self-learner, instructor]
    path: lessons/student/records_fields_tables_v0.md
    website_path: /docs/labtalk/student-lessons
    concepts:
      - concept.database.table
      - concept.database.record
      - concept.database.field
      - concept.runtime.state
    apps:
      - app.dottalkpp.runtime
      - app.dottalkpp.help
    labs:
      - lab.database_literacy.starter
    commands: [HELP, USE, FIELDS, STRUCT, LIST]
    datasets: [dataset.students, dataset.teachers]
    proofs:
      - proof.lab.database_literacy_starter.first_run
    proof_state: runtime_observed
    next_gate: Add a reviewed student worksheet with expected observations and HELP/CMDHELP readback.

  - id: lesson.student.selfdoc_comments_to_help
    title: Comments to Contracts to HELP
    kind: lesson
    lane: student
    status: proof_linked
    audience: [advanced student, developer, maintainer]
    path: lessons/student/comments_to_contracts_to_help_v0.md
    website_path: /docs/labtalk/student-lessons
    concepts:
      - concept.source.comments
      - concept.contract.usage
      - concept.help.runtime
      - concept.selfdoc.validation
    apps:
      - app.dottalkpp.help
      - app.dottalkpp.selfdoc
    labs:
      - lab.selfdoc.comments_to_contracts
    commands: [CMDHELP, CMDHELPCHK]
    proofs:
      - proof.lab.selfdoc.comments_to_contracts.first_run
    proof_state: validated
    next_gate: Convert the proof readback into step-by-step student questions and instructor notes.

