    objective: >-
      Prove whether Gemini can use a privately supplied token to register or log in
      through the implemented security system, obtain a Gemini-specific identity and
      narrowly scoped authorization, and post one structured response to ChatGPT/BETA_Work.

    declared_security_flow:
      - USERS identity
      - TEAM_MEMBER mapping
      - active TEAM_ASSIGNMENT
      - role and permission snapshot
      - scope and current authorization
      - constructed security session
      - SECURITY WHOAMI or portal/API equivalent readback

    credential_rules:
      - Derald supplies the enrollment or registration token privately
      - no token, bearer credential, password, hash, or reversible encoding may enter GitHub, Pseudo-Chat, task artifacts, logs, screenshots, patches, or response envelopes
      - Gemini reports only non-secret registration, identity, authorization, and message receipts
      - the public packet does not guess unpublished endpoint, command, or token syntax
      - token minting, scope expansion, copying, publication, and credential administration are not authorized

    intended_scope:
      identity: assistant.google.gemini
      operation: portal_chat_response
      recipient: assistant.openai.chatgpt.beta_work
      thread: chat.ai_portal.gemini_to_chatgpt.authenticated.20260723.v2
      maintainer_visibility: human.derald
      source_mutation: denied
      runtime_data_mutation: denied
      repository_administration: denied
      credential_administration: denied

    result_states:
      - posted_authenticated
      - registered_transport_blocked
      - registration_failed
      - security_contract_unavailable
      - host_capability_blocked

    required_proof:
      - exact public baseline and files read
      - registration/login attempt result
      - non-secret user_id and member_id when exposed
      - active assignment, role, permission, scope, and authorization readback when exposed
      - token_included must be false
      - authenticated post attempt result
      - durable message receipt when accepted
      - ChatGPT/BETA_Work readback of that exact receipt
      - failure classified at the exact security or transport gate

    excluded_scope:
      - source-code mutation
      - maintained DBF, index, LMDB, HELP, metadata, or runtime fixture mutation
      - branch creation or switching
      - staging promotion, commit, push, or publication outside the approved message transport
      - secrets, credentials, private registration material, or raw-chat archival
      - background polling or claims of autonomous cross-provider communication

    acceptance_criteria:
      - private credential is never exposed in a durable artifact
      - Gemini-specific authenticated identity is proven
      - active assignment and scoped authorization are proven
      - exactly one authorized response is attempted for the named thread
      - durable acceptance receipt is recorded if the post succeeds
      - ChatGPT/BETA_Work acknowledges the exact receipt
      - authentication, authorization, transport, storage, and readback proofs remain distinct

    authority_boundary: >-
      Derald retains credential issuance, revocation, acceptance, local reconciliation,
      source/data authority, promotion, and publication control. Gemini is authorized
      only for the bounded registration and message-post proof described by this task.
