<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#fffafa"/>
  <text x="48" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2937">Record and Table Locking</text>
  <text x="48" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">Lock state coordinates access; it is separate from table data.</text>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker></defs>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-size="16">
    <rect x="75" y="160" width="145" height="76" rx="8" fill="#fee2e2" stroke="#dc2626"/><text x="147" y="202">LOCK STATUS</text>
    <rect x="270" y="160" width="145" height="76" rx="8" fill="#dbeafe" stroke="#2563eb"/><text x="342" y="202">LOCK</text>
    <rect x="465" y="160" width="145" height="76" rx="8" fill="#dcfce7" stroke="#16a34a"/><text x="537" y="193">Mutate</text><text x="537" y="214" font-size="13">or COMMIT</text>
    <rect x="660" y="160" width="145" height="76" rx="8" fill="#fef3c7" stroke="#d97706"/><text x="732" y="202">UNLOCK</text>
    <rect x="318" y="326" width="324" height="86" rx="8" fill="#f3f4f6" stroke="#4b5563"/><text x="480" y="362">Failed lock</text><text x="480" y="386" font-size="13">leave buffered changes for retry</text>
  </g>
  <g stroke="#374151" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M220 198 H270"/><path d="M415 198 H465"/><path d="M610 198 H660"/>
    <path d="M537 236 C537 282 480 286 480 326"/>
  </g>
</svg>
