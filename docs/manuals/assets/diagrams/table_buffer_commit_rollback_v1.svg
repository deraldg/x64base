<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Table Buffering, Commit, and Rollback</text>
  <text x="48" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">Buffered changes require explicit closure.</text>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker></defs>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-size="16">
    <rect x="90" y="190" width="180" height="90" rx="8" fill="#dbeafe" stroke="#2563eb"/><text x="180" y="228">TABLE BUFFER ON</text><text x="180" y="251" font-size="13">stage changes</text>
    <rect x="390" y="190" width="180" height="90" rx="8" fill="#fef3c7" stroke="#d97706"/><text x="480" y="228">Change buffer</text><text x="480" y="251" font-size="13">dirty/stale entries</text>
    <rect x="700" y="120" width="170" height="76" rx="8" fill="#dcfce7" stroke="#16a34a"/><text x="785" y="163">COMMIT</text>
    <rect x="700" y="310" width="170" height="76" rx="8" fill="#fee2e2" stroke="#dc2626"/><text x="785" y="353">ROLLBACK</text>
    <rect x="420" y="380" width="120" height="52" rx="8" fill="#e5e7eb" stroke="#4b5563"/><text x="480" y="412">Readback</text>
  </g>
  <g stroke="#374151" stroke-width="2.3" fill="none" marker-end="url(#arrow)">
    <path d="M270 235 H390"/><path d="M570 220 C630 180 650 158 700 158"/><path d="M570 250 C630 310 650 348 700 348"/><path d="M785 196 C785 435 540 430 510 432"/>
  </g>
</svg>
