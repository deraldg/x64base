    <rect x="80" y="130" width="230" height="78" rx="8" fill="#dbeafe" stroke="#2563eb"/><text x="110" y="163" font-weight="700" fill="#1e3a8a">User Guide</text><text x="110" y="187" fill="#1e40af">ordinary workflows</text>
    <rect x="365" y="130" width="230" height="78" rx="8" fill="#dcfce7" stroke="#16a34a"/><text x="395" y="163" font-weight="700" fill="#14532d">Command Reference</text><text x="395" y="187" fill="#166534">commands and functions</text>
