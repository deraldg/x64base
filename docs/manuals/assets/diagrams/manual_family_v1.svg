    <rect x="365" y="270" width="230" height="78" rx="8" fill="#fee2e2" stroke="#dc2626"/><text x="395" y="303" font-weight="700" fill="#7f1d1d">Data Dictionary</text><text x="395" y="327" fill="#991b1b">schemas and fields</text>
