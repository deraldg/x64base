<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="800" viewBox="0 0 1440 800" role="img" aria-labelledby="title desc">
  <title id="title">Procedural curation lanes</title><desc id="desc">Six coordinated lanes turn implementation evidence into reviewed manuals, diagrams, and website pages while preserving ownership, proof status, and feedback.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#526273"/></marker><filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173044" flood-opacity=".12"/></filter></defs>
  <rect width="1440" height="800" fill="#f5f8fa"/>
  <text x="64" y="70" font-family="Inter,Segoe UI,sans-serif" font-size="36" font-weight="700" fill="#152536">Procedural Curation · Six Coordinated Lanes</text>
  <text x="64" y="106" font-family="Inter,Segoe UI,sans-serif" font-size="18" fill="#526273">Each lane has an owner, an artifact, and a gate. Promotion happens only after the lanes reconcile.</text>
  <g font-family="Inter,Segoe UI,sans-serif" filter="url(#shadow)">
    <g transform="translate(64 156)"><rect width="206" height="392" rx="8" fill="#fff" stroke="#2f7d69" stroke-width="2"/><rect width="206" height="72" rx="8" fill="#2f7d69"/><text x="20" y="31" font-size="14" font-weight="700" fill="#dff6ee">LANE 1</text><text x="20" y="57" font-size="21" font-weight="700" fill="#fff">Source + Runtime</text><text x="20" y="113" font-size="14" font-weight="700" fill="#2f7d69">COLLECT</text><text x="20" y="145" font-size="16" fill="#152536">headers · registrations</text><text x="20" y="173" font-size="16" fill="#152536">runtime transcripts</text><text x="20" y="201" font-size="16" fill="#152536">canaries · tests</text><line x1="20" y1="230" x2="186" y2="230" stroke="#d8e0e5"/><text x="20" y="263" font-size="14" font-weight="700" fill="#526273">OUTPUT</text><text x="20" y="292" font-size="16" fill="#152536">evidence snapshot</text><text x="20" y="330" font-size="14" font-weight="700" fill="#526273">GATE</text><text x="20" y="359" font-size="15" fill="#152536">behavior observed or</text><text x="20" y="383" font-size="15" fill="#152536">source-evidenced</text></g>
    <g transform="translate(286 156)"><rect width="206" height="392" rx="8" fill="#fff" stroke="#3c6f9e" stroke-width="2"/><rect width="206" height="72" rx="8" fill="#3c6f9e"/><text x="20" y="31" font-size="14" font-weight="700" fill="#e7f1fb">LANE 2</text><text x="20" y="57" font-size="21" font-weight="700" fill="#fff">HELP + Contracts</text><text x="20" y="113" font-size="14" font-weight="700" fill="#3c6f9e">EXPLAIN</text><text x="20" y="145" font-size="16" fill="#152536">HELP · CMDHELP</text><text x="20" y="173" font-size="16" fill="#152536">usage · comments</text><text x="20" y="201" font-size="16" fill="#152536">mutation + risk labels</text><line x1="20" y1="230" x2="186" y2="230" stroke="#d8e0e5"/><text x="20" y="263" font-size="14" font-weight="700" fill="#526273">OUTPUT</text><text x="20" y="292" font-size="16" fill="#152536">identity + semantics</text><text x="20" y="330" font-size="14" font-weight="700" fill="#526273">GATE</text><text x="20" y="359" font-size="15" fill="#152536">CMDHELPCHK and</text><text x="20" y="383" font-size="15" fill="#152536">contract validation</text></g>
    <g transform="translate(508 156)"><rect width="206" height="392" rx="8" fill="#fff" stroke="#785b98" stroke-width="2"/><rect width="206" height="72" rx="8" fill="#785b98"/><text x="20" y="31" font-size="14" font-weight="700" fill="#f1eafb">LANE 3</text><text x="20" y="57" font-size="21" font-weight="700" fill="#fff">Metadata</text><text x="20" y="113" font-size="14" font-weight="700" fill="#785b98">NORMALIZE</text><text x="20" y="145" font-size="16" fill="#152536">registries · aliases</text><text x="20" y="173" font-size="16" fill="#152536">families · crosswalks</text><text x="20" y="201" font-size="16" fill="#152536">status + provenance</text><line x1="20" y1="230" x2="186" y2="230" stroke="#d8e0e5"/><text x="20" y="263" font-size="14" font-weight="700" fill="#526273">OUTPUT</text><text x="20" y="292" font-size="16" fill="#152536">catalog records</text><text x="20" y="330" font-size="14" font-weight="700" fill="#526273">GATE</text><text x="20" y="359" font-size="15" fill="#152536">identity reconciled;</text><text x="20" y="383" font-size="15" fill="#152536">uncertainty labeled</text></g>
    <g transform="translate(730 156)"><rect width="206" height="392" rx="8" fill="#fff" stroke="#b1662d" stroke-width="2"/><rect width="206" height="72" rx="8" fill="#b1662d"/><text x="20" y="31" font-size="14" font-weight="700" fill="#fff1df">LANE 4</text><text x="20" y="57" font-size="21" font-weight="700" fill="#fff">SelfDoc</text><text x="20" y="113" font-size="14" font-weight="700" fill="#b1662d">PRESERVE</text><text x="20" y="145" font-size="16" fill="#152536">scanners · inventories</text><text x="20" y="173" font-size="16" fill="#152536">reports · proof links</text><text x="20" y="201" font-size="16" fill="#152536">drift findings</text><line x1="20" y1="230" x2="186" y2="230" stroke="#d8e0e5"/><text x="20" y="263" font-size="14" font-weight="700" fill="#526273">OUTPUT</text><text x="20" y="292" font-size="16" fill="#152536">versioned evidence shelf</text><text x="20" y="330" font-size="14" font-weight="700" fill="#526273">GATE</text><text x="20" y="359" font-size="15" fill="#152536">provenance retained;</text><text x="20" y="383" font-size="15" fill="#152536">no auto-promotion</text></g>
    <g transform="translate(952 156)"><rect width="206" height="392" rx="8" fill="#fff" stroke="#a04655" stroke-width="2"/><rect width="206" height="72" rx="8" fill="#a04655"/><text x="20" y="31" font-size="14" font-weight="700" fill="#fdecef">LANE 5</text><text x="20" y="57" font-size="21" font-weight="700" fill="#fff">MDO Review</text><text x="20" y="113" font-size="14" font-weight="700" fill="#a04655">CURATE</text><text x="20" y="145" font-size="16" fill="#152536">compare · reconcile</text><text x="20" y="173" font-size="16" fill="#152536">accept · defer · reject</text><text x="20" y="201" font-size="16" fill="#152536">attach diagram targets</text><line x1="20" y1="230" x2="186" y2="230" stroke="#d8e0e5"/><text x="20" y="263" font-size="14" font-weight="700" fill="#526273">OUTPUT</text><text x="20" y="292" font-size="16" fill="#152536">review decision</text><text x="20" y="330" font-size="14" font-weight="700" fill="#526273">GATE</text><text x="20" y="359" font-size="15" fill="#152536">human ownership and</text><text x="20" y="383" font-size="15" fill="#152536">target approved</text></g>
    <g transform="translate(1174 156)"><rect width="206" height="392" rx="8" fill="#fff" stroke="#4e6575" stroke-width="2"/><rect width="206" height="72" rx="8" fill="#4e6575"/><text x="20" y="31" font-size="14" font-weight="700" fill="#edf3f5">LANE 6</text><text x="20" y="57" font-size="21" font-weight="700" fill="#fff">Manual + Web</text><text x="20" y="113" font-size="14" font-weight="700" fill="#4e6575">PACKAGE</text><text x="20" y="145" font-size="16" fill="#152536">manualgen · sections</text><text x="20" y="173" font-size="16" fill="#152536">diagrams · pages</text><text x="20" y="201" font-size="16" fill="#152536">release metadata</text><line x1="20" y1="230" x2="186" y2="230" stroke="#d8e0e5"/><text x="20" y="263" font-size="14" font-weight="700" fill="#526273">OUTPUT</text><text x="20" y="292" font-size="16" fill="#152536">reviewed derivative</text><text x="20" y="330" font-size="14" font-weight="700" fill="#526273">GATE</text><text x="20" y="359" font-size="15" fill="#152536">build + public-content</text><text x="20" y="383" font-size="15" fill="#152536">guard passes</text></g>
  </g>
  <g stroke="#526273" stroke-width="3" marker-end="url(#arrow)"><path d="M270 352H278"/><path d="M492 352H500"/><path d="M714 352H722"/><path d="M936 352H944"/><path d="M1158 352H1166"/></g>
  <rect x="64" y="596" width="1316" height="92" rx="8" fill="#142536"/>
  <text x="88" y="630" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#7fd7cf">RECONCILIATION GATE</text>
  <text x="88" y="661" font-family="Inter,Segoe UI,sans-serif" font-size="18" fill="#fff">command identity + proof status + mutation risk + provenance + target ownership must agree before promotion</text>
  <path d="M1276 696C1276 757 166 757 166 696" fill="none" stroke="#a04655" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrow)"/>
  <text x="550" y="764" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#a04655">drift or contradiction returns to the owning lane</text>
</svg>
