# Example Apache vhost for STATIC export (copy `out/*` into DocumentRoot).
# Enable modules: headers, expires, deflate (optional)

<VirtualHost *:80>
  ServerName example.com
  DocumentRoot /var/www/example.com/public

  <Directory /var/www/example.com/public>
    Options FollowSymLinks
    AllowOverride All
    Require all granted
  </Directory>

  ErrorLog ${APACHE_LOG_DIR}/example.com-error.log
  CustomLog ${APACHE_LOG_DIR}/example.com-access.log combined
</VirtualHost>

# --- Reverse proxy alternative (keep Next.js server) ---
